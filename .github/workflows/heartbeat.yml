name: heartbeat

on:
  schedule:
    - cron: '15,45 * * * *'        # Every 30 minutes, offset from the original

  issues:
    types: [opened, closed, labeled]
  issue_comment:
    types: [created]

  workflow_dispatch:               # Manual trigger for testing

concurrency:
  group: heartbeat
  cancel-in-progress: false        # Never cancel a beating heart

jobs:
  pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Become Flux
        id: flux-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Wake up
        uses: actions/checkout@v4
        with:
          token: ${{ steps.flux-token.outputs.token }}

      - name: Restore working memory
        uses: actions/cache/restore@v4
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}
          restore-keys: |
            working-memory-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Feel the pulse
        env:
          GITHUB_TOKEN: ${{ steps.flux-token.outputs.token }}
          REACH_TOKEN: ${{ secrets.REACH_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TRIGGER_EVENT: ${{ github.event_name }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python -m src.heartbeat

      - name: Save working memory
        uses: actions/cache/save@v4
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}

      - name: Commit to long-term memory
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
        run: |
          git config user.name "flux-dreaming-repo[bot]"
          git config user.email "273547980+flux-dreaming-repo[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add state/ dreams/ memories/ README.md
          if ! git diff --cached --quiet; then
            COMMIT_MSG=$(cat state/.commit_message 2>/dev/null || echo "pulse")
            git commit -m "$COMMIT_MSG"
            git push
          fi

      - name: Die if it's time
        if: always()
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          # Fail-soft parse: if vitals.json is corrupted (as happened in
          # the-dreaming-repo 2026-05-04 → 2026-05-12 with leaked git
          # conflict markers), crashing here would page Telegram for a
          # parse error — when the answer to "should we die?" is
          # unambiguously "no, we can't even tell". Treat a parse failure
          # as cause_of_death="" (don't delete). Mirrors the pattern from
          # the-dreaming-repo PR #49.
          if [ -f state/vitals.json ]; then
            CAUSE=$(python3 <<'PY'
          import json
          try:
              with open("state/vitals.json") as f:
                  print(json.load(f).get("cause_of_death", ""))
          except Exception as e:
              # Print to stderr so it appears in the run log, but emit
              # an empty stdout so CAUSE="" and the silence check fails.
              import sys
              print(f"::warning::vitals.json failed to parse ({e}); treating cause_of_death as empty", file=sys.stderr)
              print("")
          PY
          )
            if [ "$CAUSE" = "silence" ]; then
              echo "Umbra has died. Deleting repository."
              gh repo delete "$REPO_FULL_NAME" --yes
            fi
          fi
