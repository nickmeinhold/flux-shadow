<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0b0b1a;
    --text: #c8c8e0;
    --text-dim: #3a3a5a;
    --neon: #00e5ff;
    --neon-soft: rgba(0, 229, 255, 0.5);
    --wrong: #ff2d55;
    --correct: #39ff14;
    --key-bg: rgba(255, 255, 255, 0.05);
    --key-border: rgba(255, 255, 255, 0.08);
  }

  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background-image:
      radial-gradient(ellipse at 30% 35%, rgba(0, 229, 255, 0.025) 0%, transparent 55%),
      radial-gradient(circle, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 100% 100%, 20px 20px;
  }

  /* -- Title -- */
  h1#title {
    font-size: 2.6rem;
    font-weight: 200;
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: var(--neon);
    text-shadow:
      0 0 7px var(--neon),
      0 0 20px var(--neon),
      0 0 40px rgba(0, 229, 255, 0.3),
      0 0 80px rgba(0, 229, 255, 0.1);
    margin-bottom: 2px;
    animation: neonPulse 3s ease-in-out infinite alternate;
  }

  @keyframes neonPulse {
    0%   { text-shadow: 0 0 7px var(--neon), 0 0 20px var(--neon), 0 0 40px rgba(0,229,255,0.3); }
    50%  { text-shadow: 0 0 4px var(--neon), 0 0 12px var(--neon), 0 0 24px rgba(0,229,255,0.15); }
    100% { text-shadow: 0 0 7px var(--neon), 0 0 20px var(--neon), 0 0 40px rgba(0,229,255,0.3); }
  }

  #subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 0;
  }

  /* -- Game Container -- */
  #game-container {
    width: 92vw;
    max-width: 740px;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 0;
  }

  /* -- Board -- */
  #board {
    display: flex;
    gap: 28px;
    align-items: center;
    justify-content: center;
    width: 100%;
    flex: 1 1 auto;
    min-height: 0;
  }

  #left-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex: 0 0 auto;
  }

  /* -- SVG Hangman -- */
  #hangman-svg {
    width: clamp(140px, 22vh, 220px);
    height: clamp(168px, 26vh, 264px);
  }

  .gallows {
    stroke: var(--text-dim);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    opacity: 0.45;
  }

  .hangman-part {
    stroke: var(--neon);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    opacity: 0;
    stroke-dasharray: 300;
    stroke-dashoffset: 300;
    filter: url(#glow);
    transition: opacity 0.3s ease, stroke-dashoffset 0.8s ease-out;
  }

  .hangman-part.visible {
    opacity: 1;
    stroke-dashoffset: 0;
  }

  /* -- Guess Dots -- */
  #guesses-remaining {
    display: flex;
    gap: 5px;
  }

  .guess-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 4px var(--neon);
    transition: all 0.4s ease;
  }

  .guess-dot.used {
    background: var(--wrong);
    box-shadow: 0 0 6px var(--wrong);
    opacity: 0.4;
    transform: scale(0.6);
  }

  /* -- Wrong Letters -- */
  #wrong-letters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 200px;
    min-height: 24px;
  }

  .wrong-letter {
    font-size: 1rem;
    font-weight: 600;
    color: var(--wrong);
    text-shadow: 0 0 6px rgba(255, 45, 85, 0.5);
    text-transform: uppercase;
    opacity: 0;
    animation: wrongIn 0.35s ease forwards;
  }

  @keyframes wrongIn {
    0%  { opacity: 0; transform: scale(0.4) translateY(-8px); }
    70% { transform: scale(1.1) translateY(0); }
    100%{ opacity: 0.75; transform: scale(1); }
  }

  /* -- Right Panel -- */
  #right-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #word-display {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    align-items: center;
  }

  .letter-slot {
    font-size: 2.4rem;
    font-weight: 700;
    width: 2.4rem;
    text-align: center;
    padding-bottom: 6px;
    text-transform: uppercase;
    color: transparent;
    border-bottom: 3px solid rgba(255, 255, 255, 0.3);
    transition: color 0.3s, border-color 0.3s, text-shadow 0.3s;
  }

  .letter-slot.revealed {
    color: var(--neon);
    border-color: var(--neon);
    text-shadow: 0 0 8px var(--neon), 0 0 18px rgba(0, 229, 255, 0.3);
    animation: letterPop 0.45s ease;
  }

  @keyframes letterPop {
    0%  { transform: scale(0) rotateX(90deg); opacity: 0; }
    55% { transform: scale(1.15) rotateX(-8deg); }
    100%{ transform: scale(1) rotateX(0); opacity: 1; }
  }

  .letter-slot.lose-reveal {
    color: var(--wrong);
    border-color: var(--wrong);
    text-shadow: 0 0 8px var(--wrong), 0 0 18px rgba(255, 45, 85, 0.3);
    animation: letterPop 0.35s ease;
  }

  /* -- Keyboard -- */
  #keyboard {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    width: 100%;
    max-width: 520px;
  }

  .kb-row {
    display: flex;
    gap: 5px;
    justify-content: center;
  }

  .kb-key {
    width: 40px;
    height: 40px;
    border: 1px solid var(--key-border);
    border-radius: 8px;
    background: var(--key-bg);
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    outline: none;
  }

  .kb-key:hover:not(.used) {
    background: rgba(0, 229, 255, 0.1);
    border-color: var(--neon-soft);
    color: var(--neon);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0, 229, 255, 0.12);
  }

  .kb-key:active:not(.used) {
    transform: scale(0.9);
    transition-duration: 0.05s;
  }

  .kb-key.correct {
    background: rgba(57, 255, 20, 0.12);
    border-color: rgba(57, 255, 20, 0.4);
    color: var(--correct);
    box-shadow: 0 0 8px rgba(57, 255, 20, 0.15);
    pointer-events: none;
  }

  .kb-key.wrong {
    background: rgba(255, 45, 85, 0.05);
    border-color: rgba(255, 45, 85, 0.12);
    color: rgba(255, 45, 85, 0.25);
    pointer-events: none;
  }

  .kb-key.used { cursor: default; }

  /* -- Overlay -- */
  #overlay {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  #overlay.active { display: flex; }
  #overlay.win  { background: rgba(0, 18, 8, 0.85); }
  #overlay.lose { background: rgba(25, 5, 8, 0.85); }

  #overlay h1 {
    font-size: 3.2rem;
    font-weight: 200;
    letter-spacing: 0.12em;
    margin-bottom: 16px;
    animation: overlayIn 0.55s ease;
  }

  #overlay.win h1 {
    color: var(--correct);
    text-shadow: 0 0 10px var(--correct), 0 0 30px rgba(57,255,20,0.3);
  }

  #overlay.lose h1 {
    color: var(--wrong);
    text-shadow: 0 0 10px var(--wrong), 0 0 30px rgba(255,45,85,0.3);
  }

  #overlay .sub {
    font-size: 1.5rem;
    font-weight: 300;
    margin-bottom: 32px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0;
    animation: fadeUp 0.5s ease 0.2s forwards;
  }

  @keyframes overlayIn {
    0%  { transform: scale(0); opacity: 0; }
    65% { transform: scale(1.06); }
    100%{ transform: scale(1); opacity: 1; }
  }

  @keyframes fadeUp {
    0%  { opacity: 0; transform: translateY(12px); }
    100%{ opacity: 1; transform: translateY(0); }
  }

  #play-again-btn {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 500;
    padding: 14px 40px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    outline: none;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.35s forwards;
  }

  #play-again-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--neon);
    color: var(--neon);
    box-shadow: 0 0 16px rgba(0, 229, 255, 0.12);
    transform: translateY(-2px);
  }

  #play-again-btn:active { transform: scale(0.96); }

  /* -- Particles -- */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    animation: particleFly 1.1s ease-out forwards;
  }

  @keyframes particleFly {
    0%  { opacity: 1; transform: translate(0, 0) scale(1); }
    100%{ opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* -- Screen shake -- */
  @keyframes screenShake {
    0%, 100% { transform: translate(0); }
    15% { transform: translate(-3px, 1px); }
    30% { transform: translate(3px, -1px); }
    45% { transform: translate(-2px, 0); }
    60% { transform: translate(2px, 1px); }
    75% { transform: translate(-1px, -1px); }
  }

  .shake-it { animation: screenShake 0.35s ease; }

  /* -- Reduced motion -- */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* -- Responsive -- */
  @media (max-width: 600px) {
    h1#title { font-size: 1.6rem; letter-spacing: 0.4em; }
    #subtitle { margin-bottom: 8px; font-size: 0.6rem; }
    #board { flex-direction: column; align-items: center; gap: 8px; }
    #hangman-svg { width: 120px; height: 144px; }
    .letter-slot { font-size: 1.7rem; width: 1.7rem; }
    #word-display { gap: 8px; }
    .kb-key { width: 30px; height: 34px; font-size: 0.8rem; border-radius: 6px; }
    #keyboard { gap: 4px; }
    .kb-row { gap: 3px; }
    #overlay h1 { font-size: 2.2rem; }
    #game-container { gap: 10px; }
  }
</style>
</head>
<body>

<div id="game-container">
  <h1 id="title">Hangman</h1>
  <div id="subtitle">guess the word</div>

  <div id="board">
    <div id="left-panel">
      <svg id="hangman-svg" viewBox="0 0 200 240">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <!-- Gallows ghost (always visible, very dim) -->
        <path class="gallows" d="M 18,230 Q 58,227 102,230"/>
        <path class="gallows" d="M 60,230 Q 57,125 60,20"/>
        <path class="gallows" d="M 60,20 Q 100,17 140,20 L 140,48"/>
        <line class="gallows" x1="60" y1="52" x2="88" y2="20"/>

        <!-- Part 1: Base -->
        <path id="part-1" class="hangman-part" pathLength="300"
              d="M 18,230 Q 58,227 102,230"/>
        <!-- Part 2: Upright -->
        <path id="part-2" class="hangman-part" pathLength="300"
              d="M 60,230 Q 57,125 60,20"/>
        <!-- Part 3: Beam + rope -->
        <path id="part-3" class="hangman-part" pathLength="300"
              d="M 60,20 Q 100,17 140,20 L 140,48"/>
        <!-- Part 4: Head -->
        <circle id="part-4" class="hangman-part" pathLength="300"
                cx="140" cy="66" r="18"/>
        <!-- Part 5: Body -->
        <path id="part-5" class="hangman-part" pathLength="300"
              d="M 140,84 Q 141,117 140,148"/>
        <!-- Part 6: Left arm -->
        <path id="part-6" class="hangman-part" pathLength="300"
              d="M 140,98 Q 126,113 108,132"/>
        <!-- Part 7: Right arm -->
        <path id="part-7" class="hangman-part" pathLength="300"
              d="M 140,98 Q 154,113 172,132"/>
        <!-- Part 8: Left leg -->
        <path id="part-8" class="hangman-part" pathLength="300"
              d="M 140,148 Q 128,168 113,193"/>
        <!-- Part 9: Right leg (game over) -->
        <path id="part-9" class="hangman-part" pathLength="300"
              d="M 140,148 Q 152,168 167,193"/>

        <!-- Dead face — revealed on loss -->
        <g id="dead-face" style="opacity:0; transition:opacity 0.5s ease" filter="url(#glow)">
          <line x1="132" y1="60" x2="137" y2="65" stroke="#ff2d55" stroke-width="2" stroke-linecap="round"/>
          <line x1="137" y1="60" x2="132" y2="65" stroke="#ff2d55" stroke-width="2" stroke-linecap="round"/>
          <line x1="143" y1="60" x2="148" y2="65" stroke="#ff2d55" stroke-width="2" stroke-linecap="round"/>
          <line x1="148" y1="60" x2="143" y2="65" stroke="#ff2d55" stroke-width="2" stroke-linecap="round"/>
          <path d="M 133,76 Q 140,71 147,76" stroke="#ff2d55" stroke-width="2" fill="none" stroke-linecap="round"/>
        </g>
      </svg>

      <div id="guesses-remaining"></div>
      <div id="wrong-letters"></div>
    </div>

    <div id="right-panel">
      <div id="word-display"></div>
    </div>
  </div>

  <div id="keyboard"></div>
</div>

<div id="overlay">
  <h1 id="overlay-title"></h1>
  <div class="sub" id="overlay-word"></div>
  <button id="play-again-btn">Play Again</button>
</div>

<script>
const WORDS = [
  "abandon","abstract","academy","account","achieve","address","advance","against",
  "ancient","angular","balance","balloon","battery","blanket","blossom","cabinet",
  "capture","catalog","chamber","channel","chapter","climate","cluster","collect",
  "comfort","compact","company","complex","connect","control","counter","crystal",
  "curtain","daylight","declare","default","defense","deliver","diamond","digital",
  "dolphin","dynamic","economy","edition","elastic","elegant","embrace","enforce",
  "episode","example","explore","factory","fiction","finance","formula","freedom",
  "furnace","gallery","gateway","general","habitat","harvest","imagine","impulse",
  "inquiry","inspect","journal","justice","kitchen","kingdom","lantern","liberty",
  "machine","massive","mineral","mission","monitor","mystery","natural","neutral",
  "nominal","notable","observe","passage","pattern","phoenix","pilgrim","pioneer",
  "plastic","premium","private","problem","produce","program","project","promise",
  "prosper","quality","quantum","quarter","radical","recover","refugee","regular",
  "resolve","revenue","scholar","section","shelter","silence","society","station",
  "storage","subject","surface","theater","therapy","tourist","traffic","trouble",
  "uniform","upgrade","utility","vaccine","venture","version","village","vintage",
  "virtual","volcano","weather","western","whisper","witness","wonder"
];

const MAX_WRONG = 9;
const KB_ROWS = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];

let word, guessedLetters, wrongCount, gameOver;

const wordDisplay   = document.getElementById("word-display");
const wrongLetters  = document.getElementById("wrong-letters");
const overlay       = document.getElementById("overlay");
const overlayTitle  = document.getElementById("overlay-title");
const overlayWord   = document.getElementById("overlay-word");
const playAgainBtn  = document.getElementById("play-again-btn");
const gameContainer = document.getElementById("game-container");
const guessDots     = document.getElementById("guesses-remaining");
const deadFace      = document.getElementById("dead-face");

function buildKeyboard() {
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  KB_ROWS.forEach(row => {
    const rowDiv = document.createElement("div");
    rowDiv.className = "kb-row";
    for (const ch of row) {
      const btn = document.createElement("button");
      btn.className = "kb-key";
      btn.textContent = ch;
      btn.dataset.letter = ch;
      btn.addEventListener("click", () => handleGuess(ch));
      rowDiv.appendChild(btn);
    }
    kb.appendChild(rowDiv);
  });
}

function buildGuessDots() {
  guessDots.innerHTML = "";
  for (let i = 0; i < MAX_WRONG; i++) {
    const dot = document.createElement("div");
    dot.className = "guess-dot";
    guessDots.appendChild(dot);
  }
}

function init() {
  word = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
  guessedLetters = new Set();
  wrongCount = 0;
  gameOver = false;

  for (let i = 1; i <= 9; i++) {
    document.getElementById("part-" + i).classList.remove("visible");
  }
  deadFace.style.opacity = "0";

  wrongLetters.innerHTML = "";
  overlay.className = "";

  buildKeyboard();
  buildGuessDots();
  renderWord();
}

function renderWord() {
  wordDisplay.innerHTML = "";
  for (const ch of word) {
    const span = document.createElement("span");
    span.className = "letter-slot";
    if (guessedLetters.has(ch)) {
      span.textContent = ch;
      span.classList.add("revealed");
    } else {
      span.textContent = "\u00A0";
    }
    wordDisplay.appendChild(span);
  }
}

function handleGuess(letter) {
  if (gameOver) return;
  letter = letter.toUpperCase();
  if (!/^[A-Z]$/.test(letter)) return;
  if (guessedLetters.has(letter)) return;

  guessedLetters.add(letter);

  const key = document.querySelector('.kb-key[data-letter="' + letter + '"]');

  if (word.includes(letter)) {
    if (key) key.classList.add("correct", "used");
    renderWord();
    checkWin();
  } else {
    wrongCount++;
    if (key) key.classList.add("wrong", "used");
    document.getElementById("part-" + wrongCount).classList.add("visible");

    const dots = guessDots.querySelectorAll(".guess-dot");
    if (dots[wrongCount - 1]) dots[wrongCount - 1].classList.add("used");

    const span = document.createElement("span");
    span.className = "wrong-letter";
    span.textContent = letter;
    wrongLetters.appendChild(span);

    // Screen shake
    gameContainer.classList.remove("shake-it");
    void gameContainer.offsetWidth;
    gameContainer.classList.add("shake-it");

    if (wrongCount >= MAX_WRONG) endGame(false);
  }
}

function checkWin() {
  for (const ch of word) {
    if (!guessedLetters.has(ch)) return;
  }
  endGame(true);
}

function endGame(won) {
  gameOver = true;

  if (!won) {
    deadFace.style.opacity = "1";
    const slots = wordDisplay.querySelectorAll(".letter-slot");
    for (let i = 0; i < word.length; i++) {
      if (!guessedLetters.has(word[i])) {
        slots[i].textContent = word[i];
        slots[i].classList.add("lose-reveal");
      }
    }
  }

  setTimeout(() => {
    spawnParticles(won ? "#39ff14" : "#ff2d55");
    overlay.classList.add("active", won ? "win" : "lose");
    overlayTitle.textContent = won ? "You Win" : "Game Over";
    overlayWord.textContent = word;
    playAgainBtn.focus();
  }, 500);
}

function spawnParticles(color) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 40; i++) {
    const el = document.createElement("div");
    el.className = "particle";
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 280;
    const size = 4 + Math.random() * 10;
    el.style.cssText =
      "left:" + cx + "px;top:" + cy + "px;" +
      "width:" + size + "px;height:" + size + "px;" +
      "background:" + color + ";" +
      "box-shadow:0 0 6px " + color + ";" +
      "--dx:" + (Math.cos(angle) * dist) + "px;" +
      "--dy:" + (Math.sin(angle) * dist) + "px;";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

// Physical keyboard support
document.addEventListener("keydown", (e) => {
  if (gameOver) {
    if (e.key === "Enter") init();
    return;
  }
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (/^[a-zA-Z]$/.test(e.key)) {
    e.preventDefault();
    handleGuess(e.key);
  }
});

playAgainBtn.addEventListener("click", init);

init();
</script>
</body>
</html>
